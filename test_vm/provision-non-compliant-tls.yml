---
- name: Non-compliant TLS handshakes from 10.10.10.14 via ens5 every 2s (with pause and logging)
  hosts: all
  become: yes
  vars:
    fail_tls_script: /usr/local/bin/fail_tls_handshake.sh
    bind_ip: "10.10.10.14"
    iface: "ens5"
    target_host: "www.google.com"
    target_port: "443"
    ssl_cert: /etc/ssl/certs/nginx-selfsigned.crt
    ssl_key: /etc/ssl/private/nginx-selfsigned.key

  tasks:
    - name: Ensure openssl, dhclient, nginx and build dependencies are installed
      apt:
        name:
          - openssl
          - isc-dhcp-client
          - nginx
          - perl
          - pkg-config
          - zlib1g-dev
          - wget
          - gcc
          - make
        state: present
        update_cache: yes

    - name: Download OpenSSL 1.1.1u source
      get_url:
        url: https://www.openssl.org/source/openssl-1.1.1u.tar.gz
        dest: /tmp/openssl-1.1.1u.tar.gz
        mode: '0644'
        force: no

    - name: Extract OpenSSL 1.1.1u source
      unarchive:
        src: /tmp/openssl-1.1.1u.tar.gz
        dest: /tmp
        remote_src: yes
        creates: /tmp/openssl-1.1.1u

    - name: Build and install OpenSSL 1.1.1
      shell: |
        ./config --prefix=/opt/openssl-1.1.1 no-shared
        make -j"$(nproc)"
        make install_sw
      args:
        chdir: /tmp/openssl-1.1.1u
        creates: /opt/openssl-1.1.1/bin/openssl

    - name: Run dhclient on ens5 (in background)
      shell: nohup dhclient {{ iface }} &
      async: 0
      poll: 0

    - name: Download OpenSSL 3.1.4 source
      get_url:
        url: https://www.openssl.org/source/openssl-3.1.4.tar.gz
        dest: /tmp/openssl-3.1.4.tar.gz
        mode: '0644'
        force: no

    - name: Extract OpenSSL 3.1.4 source
      unarchive:
        src: /tmp/openssl-3.1.4.tar.gz
        dest: /tmp
        remote_src: yes
        creates: /tmp/openssl-3.1.4

    - name: Build and install OpenSSL 3.1.4
      shell: |
        ./config --prefix=/opt/openssl-3.1.4 no-shared
        make -j"$(nproc)"
        make install_sw
      args:
        chdir: /tmp/openssl-3.1.4
        creates: /opt/openssl-3.1.4/bin/openssl


  # NGINX

    - name: Generate self-signed SSL certificate for nginx
      command: >
        openssl req -x509 -nodes -days 365 -newkey rsa:2048
        -keyout {{ ssl_key }} -out {{ ssl_cert }}
        -subj "/CN=localhost"
      args:
        creates: "{{ ssl_cert }}"

    - name: Create nginx HTTPS config
      copy:
        dest: /etc/nginx/sites-available/ssl_default
        content: |
          server {
              listen 443 ssl;
              server_name _;
              ssl_certificate     {{ ssl_cert }};
              ssl_certificate_key {{ ssl_key }};
              ssl_protocols       TLSv1.2 TLSv1.3;
              ssl_ciphers         HIGH:!aNULL:!MD5;
              location / {
                  return 200 'nginx HTTPS is up\n';
              }
          }
          server {
              listen 80;
              server_name _;
              location / {
                  return 200 'nginx HTTP is up\n';
              }
          }

    - name: Enable nginx HTTPS config
      file:
        src: /etc/nginx/sites-available/ssl_default
        dest: /etc/nginx/sites-enabled/ssl_default
        state: link
        force: yes

    - name: Remove default nginx config (if exists)
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Ensure nginx is started and enabled
      systemd:
        name: nginx
        state: restarted
        enabled: yes

    - name: Create custom OpenSSL config for legacy protocol support
      copy:
        dest: /etc/ssl/openssl-legacy.cnf
        content: |
          .include /etc/ssl/openssl.cnf
          [system_default_sect]
          MinProtocol = TLSv1.0
          MaxProtocol = TLSv1.3

    - name: Copy fail_tls_handshake.sh script
      copy:
        dest: "{{ fail_tls_script }}"
        mode: '0755'
        content: |
          #!/bin/bash
          iface="{{ iface }}"
          ip_addr="{{ bind_ip }}"
          host="{{ target_host }}"
          port="{{ target_port }}"
          LOG="/tmp/tls_test.log"
          echo "=== $(date) ===" >> $LOG
          echo "IP on $iface:" >> $LOG
          ip -4 addr show dev $iface >> $LOG
          echo "Routing table:" >> $LOG
          ip route >> $LOG
          # Wait for IP to appear on ens5
          for i in {1..60}; do
            if ip -4 addr show dev $iface | grep -q "$ip_addr"; then
              break
            fi
            sleep 2
          done
          if ! ip -4 addr show dev $iface | grep -q "$ip_addr"; then
            echo "No IP $ip_addr on $iface" >> $LOG
            exit 1
          fi
          export OPENSSL_CONF=/etc/ssl/openssl-legacy.cnf
          OLD_OPENSSL=/opt/openssl-1.1.1/bin/openssl
          NEW_OPENSSL=/opt/openssl-3.1.4/bin/openssl
          echo "Running TLS 1.0 handshake..." >> $LOG
          timeout 3 "$OLD_OPENSSL" s_client -connect tls-v1-0.badssl.com:1010 -tls1 -bind $ip_addr -quiet < /dev/null >> $LOG 2>&1 || true
          echo "Running TLS 1.1 handshake..." >> $LOG
          timeout 3 "$OLD_OPENSSL" s_client -connect tls-v1-1.badssl.com:1011 -tls1_1 -bind $ip_addr -quiet < /dev/null >> $LOG 2>&1 || true
          echo "Running TLS 1.2 handshake..." >> $LOG
          "$NEW_OPENSSL" s_client -connect $host:$port -tls1_2 -cipher "CAMELLIA256-SHA256" -bind $ip_addr -ign_eof < /dev/null >> $LOG 2>&1
          echo "Running TLS 1.3 handshake..." >> $LOG
          "$NEW_OPENSSL" s_client -connect tls-v1-2.badssl.com:1012 -tls1_3


    - name: Create systemd service for failing TLS handshake
      copy:
        dest: /etc/systemd/system/fail-tls-handshake.service
        content: |
          [Unit]
          Description=Fail TLS handshake via ens5 from {{ bind_ip }}

          [Service]
          Type=oneshot
          ExecStart={{ fail_tls_script }}

    - name: Create systemd timer for failing TLS handshake
      copy:
        dest: /etc/systemd/system/fail-tls-handshake.timer
        content: |
          [Unit]
          Description=Run fail TLS handshake every 2 seconds

          [Timer]
          OnBootSec=5
          OnUnitActiveSec=2

          [Install]
          WantedBy=timers.target

    - name: Reload systemd
      shell: systemctl daemon-reload

    - name: Enable and start fail-tls-handshake.timer
      systemd:
        name: fail-tls-handshake.timer
        enabled: yes
        state: started

    # BLOCK ICMP 

    - name: Ensure UFW is installed
      apt:
        name: ufw
        state: present

    - name: Set UFW default policy to deny incoming
      command: ufw default deny incoming

    - name: Set UFW default policy to allow outgoing
      command: ufw default allow outgoing

    - name: Allow SSH
      command: ufw allow 22/tcp

    - name: Allow HTTP
      command: ufw allow 80/tcp

    - name: Allow SNMP
      command: ufw allow 443/tcp

    - name: Reload UFW
      command: ufw reload
