          while true; do
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
              if [[ -n "$ETH1_IP" ]]; then break; fi
              sleep 2
          done
          while true; do
              echo -ne "220 fake-smtp ESMTP Postfix\r\n" | nc -l -s $ETH1_IP -p 25
          done
    - name: Run fake SMTP netcat script as background process
      shell: nohup /usr/local/bin/fake-smtp-netcat-eth1.sh > /var/log/fake-smtp-netcat-eth1.log 2>&1 &
      args:
        creates: /var/log/fake-smtp-netcat-eth1.log

    # POP3 (TCP/110)

    - name: Kill old fake POP3 netcat processes

      shell: pkill -f 'nc -l -s .* -p 110' || true
