          #!/bin/bash
          while true; do
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
              if [[ -n "$ETH1_IP" ]]; then break; fi
              sleep 2
          done
          while true; do
              echo -ne "+OK Fake POP3 server ready\r\n" | nc -l -s $ETH1_IP -p 110
          done
    - name: Run fake POP3 netcat script as background process
      shell: nohup /usr/local/bin/fake-pop3-netcat-eth1.sh > /var/log/fake-pop3-netcat-eth1.log 2>&1 &
      args:
        creates: /var/log/fake-pop3-netcat-eth1.log

    # IMAP (TCP/143)

    - name: Kill old fake IMAP netcat processes
      shell: pkill -f 'nc -l -s .* -p 143' || true
      ignore_errors: yes
    - name: Copy fake IMAP netcat script
      copy:
        dest: /usr/local/bin/fake-imap-netcat-eth1.sh
        mode: '0755'
        content: |
          #!/bin/bash
          while true; do
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
              if [[ -n "$ETH1_IP" ]]; then break; fi
              sleep 2
          done
          while true; do
              echo -ne "* OK Fake IMAP4rev1 Service Ready\r\n" | nc -l -s $ETH1_IP -p 143
          done
    - name: Run fake IMAP netcat script as background process
      shell: nohup /usr/local/bin/fake-imap-netcat-eth1.sh > /var/log/fake-imap-netcat-eth1.log 2>&1 &
      args:
        creates: /var/log/fake-imap-netcat-eth1.log

    # HTTP (TCP/80)

    - name: Kill old fake HTTP netcat processes
      shell: pkill -f 'nc -l -s .* -p 80' || true
      ignore_errors: yes
    - name: Copy fake HTTP netcat script
      copy:
        dest: /usr/local/bin/fake-http-netcat-eth1.sh
        mode: '0755'
        content: |
          #!/bin/bash
          while true; do
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
              if [[ -n "$ETH1_IP" ]]; then break; fi
              sleep 2
          done
          while true; do
              echo -ne "HTTP/1.1 200 OK\r\nContent-Length: 2\r\n\r\nOK" | nc -l -s $ETH1_IP -p 80
          done
    - name: Run fake HTTP netcat script as background process
      shell: nohup /usr/local/bin/fake-http-netcat-eth1.sh > /var/log/fake-http-netcat-eth1.log 2>&1 &
      args:
        creates: /var/log/fake-http-netcat-eth1.log

    # SNMP (UDP/161)

    - name: Kill old fake SNMP netcat processes
      shell: pkill -f 'nc -u -l -s .* -p 161' || true
      ignore_errors: yes
    - name: Copy fake SNMP netcat script
      copy:
        dest: /usr/local/bin/fake-snmp-netcat-eth1.sh
        mode: '0755'
        content: |
          #!/bin/bash
          while true; do
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
              if [[ -n "$ETH1_IP" ]]; then break; fi
              sleep 2
          done
          while true; do
              head -c 48 /dev/zero | nc -u -l -s $ETH1_IP -p 161
          done
    - name: Run fake SNMP netcat script as background process
      shell: nohup /usr/local/bin/fake-snmp-netcat-eth1.sh > /var/log/fake-snmp-netcat-eth1.log 2>&1 &
      args:
        creates: /var/log/fake-snmp-netcat-eth1.log

    # VNC (TCP/5901)

    - name: Kill old fake VNC netcat processes
      shell: pkill -f 'nc -l -s .* -p 5901' || true
      ignore_errors: yes
    - name: Copy fake VNC netcat script
      copy:
        dest: /usr/local/bin/fake-vnc-netcat-eth1.sh
        mode: '0755'
        content: |
          #!/bin/bash
          while true; do
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
              if [[ -n "$ETH1_IP" ]]; then break; fi
              sleep 2
          done
          while true; do
              echo -ne "RFB 003.008\n" | nc -l -s $ETH1_IP -p 5901
          done
    - name: Run fake VNC netcat script as background process
      shell: nohup /usr/local/bin/fake-vnc-netcat-eth1.sh > /var/log/fake-vnc-netcat-eth1.log 2>&1 &
      args:
        creates: /var/log/fake-vnc-netcat-eth1.log

    # TFTP (UDP/69)

    - name: Kill old fake TFTP netcat processes
      shell: pkill -f 'nc -u -l -s .* -p 69' || true
      ignore_errors: yes
    - name: Copy fake TFTP netcat script
      copy:
        dest: /usr/local/bin/fake-tftp-netcat-eth1.sh
        mode: '0755'
        content: |
          #!/bin/bash
          while true; do
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
              if [[ -n "$ETH1_IP" ]]; then break; fi
              sleep 2
          done
          while true; do
              echo -ne "\x00\x05\x00\x01File not found\x00" | nc -u -l -s $ETH1_IP -p 69
          done
    - name: Run fake TFTP netcat script as background process
      shell: nohup /usr/local/bin/fake-tftp-netcat-eth1.sh > /var/log/fake-tftp-netcat-eth1.log 2>&1 &
      args:
        creates: /var/log/fake-tftp-netcat-eth1.log

    # NTP (UDP/123)

    - name: Kill old fake NTP netcat processes
      shell: pkill -f 'nc -u -l -s .* -p 123' || true
      ignore_errors: yes
    - name: Copy fake NTP netcat script
      copy:
        dest: /usr/local/bin/fake-ntp-netcat-eth1.sh
        mode: '0755'
        content: |
          #!/bin/bash
          while true; do
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
              if [[ -n "$ETH1_IP" ]]; then break; fi
              sleep 2
          done
          while true; do
              head -c 48 /dev/zero | nc -u -l -s $ETH1_IP -p 123
          done
    - name: Run fake NTP netcat script as background process
      shell: nohup /usr/local/bin/fake-ntp-netcat-eth1.sh > /var/log/fake-ntp-netcat-eth1.log 2>&1 &
      args:
        creates: /var/log/fake-ntp-netcat-eth1.log

    # BACnet

    - name: Copy fake BACnet netcat script
      copy:
        dest: /usr/local/bin/fake-bacnet-netcat-eth1.sh
        mode: '0755'
        content: |
          #!/bin/bash
          while true; do
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
              if [[ -n "$ETH1_IP" ]]; then
                  echo "eth1 IP detected: $ETH1_IP"
                  break
              fi
              echo "Waiting for eth1 IP..."
              sleep 2
          done
          while true; do
              echo -ne "Fake BACnet server\n" | nc -u -l -s $ETH1_IP -p 47808
          done



    - name: Install ISC DHCP server
      apt:
        name: isc-dhcp-server
        state: present
        update_cache: yes

    - name: Configure DHCP server to listen on eth1
      lineinfile:
        path: /etc/default/isc-dhcp-server
        regexp: '^INTERFACESv4='
        line: 'INTERFACESv4="eth1"'
        state: present

    - name: Configure DHCP subnet
      copy:
        dest: /etc/dhcp/dhcpd.conf
        content: |
          default-lease-time 600;
          max-lease-time 7200;
          authoritative;
          subnet 10.10.10.0 netmask 255.255.255.0 {
            range 10.10.10.100 10.10.10.200;
            option routers 10.10.10.1;
            option domain-name-servers 8.8.8.8, 8.8.4.4;
          }

    - name: Copy wait-for-eth1-and-start-dhcpd script
      copy:
        dest: /usr/local/bin/wait-eth1-then-dhcpd.sh
        mode: '0755'
        content: |
          #!/bin/bash
          while true; do
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
              if [[ -n "$ETH1_IP" ]]; then
                  echo "eth1 IP detected: $ETH1_IP"
                  break
              fi
              echo "Waiting for eth1 to get an IPv4 address..."
              sleep 2
          done
          echo "Starting isc-dhcp-server..."
          sudo systemctl start isc-dhcp-server
          sudo systemctl status isc-dhcp-server --no-pager

    - name: Run wait-for-eth1-and-start-dhcpd script in background
      shell: nohup /usr/local/bin/wait-eth1-then-dhcpd.sh > /var/log/wait-eth1-then-dhcpd.log 2>&1 &
      args:
        creates: /var/log/wait-eth1-then-dhcpd.log

  handlers:
    - name: Restart vsftpd
      service:
        name: vsftpd
        state: restarted