---
- hosts: all
  become: true
  tasks:
    # Common setup tasks

    - name: Gather facts
      setup:

    - name: Ensure main and universe repos are enabled
      apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_distribution_release }} main universe"
        state: present

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Python3, pip, venv, and netcat
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - libcap2-bin
          - net-tools
          - netcat-openbsd
          - isc-dhcp-client
        state: present

    # Set up networking on eth1
   
    - name: Run dhclient on eth1 (in background)
      shell: nohup dhclient eth1 &
      async: 0
      poll: 0

    # Custom Modbus TCP server NON-COMPLIANT

    - name: Copy Modbus TCP server script (pyModbusTCP)
      copy:
        src: ./python/src/modbus_server_non_compliant.py
        dest: /home/vagrant/modbus_server_non_compliant.py
        owner: vagrant
        group: vagrant
        mode: '0644'

    - name: Create systemd unit for custom Modbus server
      copy:
        dest: /etc/systemd/system/custom-modbus-server.service
        mode: '0644'
        content: |
          [Unit]
          Description=Custom Modbus TCP Error Server
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/bin/python3 /home/vagrant/modbus_server_non_compliant.py
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable and start custom Modbus server
      systemd:
        name: custom-modbus-server
        enabled: yes
        state: started

    - name: Show custom Modbus server status
      systemd:
        name: custom-modbus-server
      register: modbus_status
      changed_when: false

    # FTP server

    - name: Kill old fake FTP netcat processes
      shell: pkill -f 'nc -l -s .* -p 21' || true

      ignore_errors: yes
    - name: Copy fake FTP netcat script
      copy:
        dest: /usr/local/bin/fake-ftp-netcat-eth1.sh
        mode: '0755'
        content: |
          #!/bin/bash
          while true; do
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
              if [[ -n "$ETH1_IP" ]]; then break; fi
              sleep 2
          done
          while true; do
              echo -ne "220 Fake FTP server ready\r\n" | nc -l -s $ETH1_IP -p 21
          done
    - name: Run fake FTP netcat script as background process
      shell: nohup /usr/local/bin/fake-ftp-netcat-eth1.sh > /var/log/fake-ftp-netcat-eth1.log 2>&1 &
      args:
        creates: /var/log/fake-ftp-netcat-eth1.log


    # SSH server configuration

    - name: Gather facts
      setup:

    - name: Set eth0_ip from Ansible facts
      set_fact:
        eth0_ip: "{{ ansible_eth0.ipv4.address | default('') }}"

    - name: Fail if eth0_ip is not set
      fail:
        msg: "eth0_ip is not set! Please check network configuration."
      when: eth0_ip == ''

    - name: Debug eth0 IP
      debug:
        msg: "eth0 IP is {{ eth0_ip }}"

    - name: Stop and disable ssh.socket (prevents auto-start on all interfaces)
      service:
        name: ssh.socket
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Ensure only eth0 is in ListenAddress for sshd
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^ListenAddress'
        line: "ListenAddress {{ eth0_ip }}"
        state: present
        insertafter: '^#Port'

    - name: Remove all other ListenAddress lines from sshd_config
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^ListenAddress (?!{{ eth0_ip }})'
        state: absent

    - name: Restart sshd
      service:
        name: ssh
        state: restarted

    - name: Show what is listening on port 22
      shell: ss -tlnp | grep :22 || netstat -tlnp | grep :22 || true
      register: port22
      changed_when: false

    - debug:
        var: port22.stdout_lines


    - name: Create fake SSH banner systemd service for eth1:22
      copy:
        dest: /etc/systemd/system/fake-ssh-banner.service
        mode: '0644'
        content: |
          [Unit]
          Description=Fake SSH Banner on eth1:22
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          ExecStart=/bin/bash -c '\
            while true; do \
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP "(?<=inet\s)\d+(\.\d+){3}"); \
              if [[ -n "$ETH1_IP" ]]; then \
                echo "eth1 IP detected: $ETH1_IP"; \
                break; \
              fi; \
              echo "Waiting for eth1 IP..."; \
              sleep 2; \
            done; \
            while true; do echo -e "SSH-1.99-OpenSSH_1.99\r\n" | nc -l -s $ETH1_IP -p 22; done'
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Restart fake-ssh-banner service
      systemd:
        name: fake-ssh-banner.service
        state: restarted
        enabled: yes

    # Telnet server setup

    - name: Kill old fake Telnet netcat processes
      shell: pkill -f 'nc -l -s .* -p 23' || true
      ignore_errors: yes
    - name: Copy fake Telnet netcat script
      copy:
        dest: /usr/local/bin/fake-telnet-netcat-eth1.sh
        mode: '0755'
        content: |
          #!/bin/bash
          while true; do
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
              if [[ -n "$ETH1_IP" ]]; then break; fi
              sleep 2
          done
          while true; do
              echo -ne "Fake Telnet server\r\n" | nc -l -s $ETH1_IP -p 23
          done
    - name: Run fake Telnet netcat script as background process
      shell: nohup /usr/local/bin/fake-telnet-netcat-eth1.sh > /var/log/fake-telnet-netcat-eth1.log 2>&1 &
      args:
        creates: /var/log/fake-telnet-netcat-eth1.log

    # SMTP (TCP/25)

    - name: Kill old fake SMTP netcat processes
      shell: pkill -f 'nc -l -s .* -p 25' || true
      ignore_errors: yes
    - name: Copy fake SMTP netcat script
