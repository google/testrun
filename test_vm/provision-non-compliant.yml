---
- hosts: all
  become: true
  tasks:
    # Common setup tasks

    - name: Gather facts
      setup:

    - name: Ensure main and universe repos are enabled
      apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_distribution_release }} main universe"
        state: present

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Python3, pip, venv, and setcap utility
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - libcap2-bin
          - net-tools
          - netcat-openbsd
          - isc-dhcp-client
          - vsftpd
          - netcat-openbsd
          - inetutils-inetd
          - inetutils-telnetd
          - postfix
          - dovecot-pop3d
          - dovecot-imapd
          - nginx
          - snmpd
        state: present

    # Set up networking on eth1
   
    - name: Run dhclient on eth1 (in background)
      shell: nohup dhclient eth1 &
      async: 0
      poll: 0

    # Custom Modbus TCP server NON-COMPLIANT

    - name: Copy Modbus TCP server script (pyModbusTCP)
      copy:
        src: ./python/src/modbus_server_non_compliant.py
        dest: /home/vagrant/modbus_server_non_compliant.py
        owner: vagrant
        group: vagrant
        mode: '0644'

    - name: Create systemd unit for custom Modbus server
      copy:
        dest: /etc/systemd/system/custom-modbus-server.service
        mode: '0644'
        content: |
          [Unit]
          Description=Custom Modbus TCP Error Server
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/bin/python3 /home/vagrant/modbus_server_non_compliant.py
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable and start custom Modbus server
      systemd:
        name: custom-modbus-server
        enabled: yes
        state: started

    - name: Show custom Modbus server status
      systemd:
        name: custom-modbus-server
      register: modbus_status
      changed_when: false

    # FTP server

    - name: Ensure vsftpd is running and enabled
      service:
        name: vsftpd
        state: started
        enabled: yes

    - name: Copy custom vsftpd config (optional)
      copy:
        src: ./vsftpd.conf
        dest: /etc/vsftpd.conf
        owner: root
        group: root
        mode: 0644
      notify: Restart vsftpd
      when: vsftpd.conf is defined

    # SSH server configuration

    - name: Gather facts
      setup:

    - name: Set eth0_ip from Ansible facts
      set_fact:
        eth0_ip: "{{ ansible_eth0.ipv4.address | default('') }}"

    - name: Fail if eth0_ip is not set
      fail:
        msg: "eth0_ip is not set! Please check network configuration."
      when: eth0_ip == ''

    - name: Debug eth0 IP
      debug:
        msg: "eth0 IP is {{ eth0_ip }}"

    - name: Stop and disable ssh.socket (prevents auto-start on all interfaces)
      service:
        name: ssh.socket
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Ensure only eth0 is in ListenAddress for sshd
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^ListenAddress'
        line: "ListenAddress {{ eth0_ip }}"
        state: present
        insertafter: '^#Port'

    - name: Remove all other ListenAddress lines from sshd_config
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^ListenAddress (?!{{ eth0_ip }})'
        state: absent

    - name: Restart sshd
      service:
        name: ssh
        state: restarted

    - name: Show what is listening on port 22
      shell: ss -tlnp | grep :22 || netstat -tlnp | grep :22 || true
      register: port22
      changed_when: false

    - debug:
        var: port22.stdout_lines


    - name: Create fake SSH banner systemd service for eth1:22
      copy:
        dest: /etc/systemd/system/fake-ssh-banner.service
        mode: '0644'
        content: |
          [Unit]
          Description=Fake SSH Banner on eth1:22
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          ExecStart=/bin/bash -c '\
            while true; do \
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP "(?<=inet\s)\d+(\.\d+){3}"); \
              if [[ -n "$ETH1_IP" ]]; then \
                echo "eth1 IP detected: $ETH1_IP"; \
                break; \
              fi; \
              echo "Waiting for eth1 IP..."; \
              sleep 2; \
            done; \
            while true; do echo -e "SSH-1.99-OpenSSH_1.99\r\n" | nc -l -s $ETH1_IP -p 22; done'
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Restart fake-ssh-banner service
      systemd:
        name: fake-ssh-banner.service
        state: restarted
        enabled: yes

    # Telnet server setup

    - name: Ensure telnet service is enabled in /etc/inetd.conf
      lineinfile:
        path: /etc/inetd.conf
        regexp: '^#?telnet\s'
        line: 'telnet  stream  tcp     nowait  root    /usr/sbin/tcpd  /usr/sbin/in.telnetd'
        state: present

    - name: Restart inetutils-inetd
      service:
        name: inetutils-inetd
        state: restarted

    # SMTP POP IMAP server setup

    - name: Ensure submission and smtps are enabled in Postfix master.cf
      blockinfile:
        path: /etc/postfix/master.cf
        block: |
          submission inet n       -       y       -       -       smtpd
            -o syslog_name=postfix/submission
            -o smtpd_tls_security_level=encrypt
            -o smtpd_sasl_auth_enable=yes
            -o smtpd_client_restrictions=permit_sasl_authenticated,reject
          smtps     inet  n       -       y       -       -       smtpd
            -o syslog_name=postfix/smtps
            -o smtpd_tls_wrappermode=yes
            -o smtpd_sasl_auth_enable=yes
            -o smtpd_client_restrictions=permit_sasl_authenticated,reject

    - name: Restart Postfix
      service:
        name: postfix
        state: restarted

    - name: Restart Dovecot
      service:
        name: dovecot
        state: restarted

    # HTTP server setup

    - name: Ensure Nginx is running and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    # SNMP server 

    - name: Copy SNMP eth1 binding script
      copy:
        dest: /usr/local/bin/snmpd-eth1.sh
        mode: '0755'
        content: |
          #!/bin/bash
          while true; do
              ETH1_IP=$(ip -4 addr show eth1 | grep -oP '(?<=inet\s)\d+(\.\d+){3}')
              if [[ -n "$ETH1_IP" ]]; then
                  echo "eth1 IP detected: $ETH1_IP"
                  break
              fi
              echo "Waiting for eth1 IP..."
              sleep 2
          done

          # Update snmpd.conf to listen only on eth1
          sudo sed -i "s/^agentAddress.*/agentAddress  udp:$ETH1_IP:161/" /etc/snmp/snmpd.conf

          # If no agentAddress line exists, add it
          if ! grep -q "^agentAddress" /etc/snmp/snmpd.conf; then
              echo "agentAddress  udp:$ETH1_IP:161" | sudo tee -a /etc/snmp/snmpd.conf
          fi

          # Restart snmpd
          sudo systemctl restart snmpd

          echo "snmpd is now listening on $ETH1_IP:161 (eth1 only)"

    - name: Run SNMP eth1 binding script in background
      shell: nohup /usr/local/bin/snmpd-eth1.sh > /var/log/snmpd-eth1.log 2>&1 &
      args:
        creates: /var/log/snmpd-eth1.log

  handlers:
    - name: Restart vsftpd
      service:
        name: vsftpd
        state: restarted