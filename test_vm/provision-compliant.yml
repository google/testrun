---
- hosts: all
  become: true
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Python3, pip, venv, and setcap utility
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - libcap2-bin
        state: present

    - name: Install DHCP client
      apt:
        name: isc-dhcp-client
        state: present
        update_cache: yes

    - name: Run dhclient on eth1 (in background)
      shell: nohup dhclient eth1 &
      async: 0
      poll: 0

    - name: Install netstat for network troubleshooting
      apt:
        name: net-tools
        state: present
        update_cache: yes

    - name: Install BACnet dependencies
      apt:
        name:
          - git
          - gcc
          - make
          - bison
          - flex
          - libpcap-dev
        state: present
        update_cache: yes

    - name: Clone BACnet stack repository
      git:
        repo: https://github.com/bacnet-stack/bacnet-stack.git
        dest: /opt/bacnet-stack
        version: master

    - name: Build BACnet stack
      make:
        chdir: /opt/bacnet-stack
        target: all

    - name: Copy bacserv-wrapper.sh
      copy:
        dest: /usr/local/bin/bacserv-wrapper.sh
        mode: '0755'
        content: |
          #!/bin/bash
          IFACE=eth1
          while true; do
            IP=$(ip -4 addr show $IFACE | awk '/inet / {print $2}' | cut -d/ -f1)
            if [ -n "$IP" ]; then
              export BACNET_IP=$IP
              exec /opt/bacnet-stack/bin/bacserv
            fi
            sleep 2
          done

    - name: Create systemd unit for bacserv
      copy:
        dest: /etc/systemd/system/bacserv.service
        mode: '0644'
        content: |
          [Unit]
          Description=BACnet Server (auto-restart on IP change)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/bacserv-wrapper.sh
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd and enable bacserv service
      systemd:
        name: bacserv
        enabled: yes
        state: restarted
        daemon_reload: yes

    - name: Check if bacserv process is running
      shell: pgrep -fl bacserv
      register: bacserv_process
      changed_when: false

    - name: Show information about bacserv process
      debug:
        var: bacserv_process.stdout_lines

    - name: Show last lines of bacserv log
      shell: tail -n 20 /opt/bacnet-stack/bacserv.log
      register: bacserv_log
      changed_when: false
      ignore_errors: true

    - name: Display bacserv log
      debug:
        var: bacserv_log.stdout_lines

    - name: Create venv for modbus
      become: no
      command: python3 -m venv /home/vagrant/modbus-venv
      args:
        creates: /home/vagrant/modbus-venv

    - name: Create venv for modbus
      become: no
      command: python3 -m venv /home/vagrant/modbus-venv
      args:
        creates: /home/vagrant/modbus-venv

    - name: Install pyModbusTCP in venv
      become: no
      command: /home/vagrant/modbus-venv/bin/pip install pyModbusTCP

    - name: Find real python binary path
      shell: readlink -f /home/vagrant/modbus-venv/bin/python
      register: real_python_path

    - name: Allow system python to bind to port 502
      become: true
      command: setcap 'cap_net_bind_service=+ep' {{ real_python_path.stdout }}

    - name: Copy Modbus TCP server script (pyModbusTCP)
      copy:
        src: ./python/src/modbus_server.py
        dest: /home/vagrant/modbus_server.py
        owner: vagrant
        group: vagrant
        mode: '0644'

    - name: Ensure modbus server is running (systemd)
      copy:
        dest: /etc/systemd/system/modbus-server.service
        content: |
          [Unit]
          Description=Modbus TCP Server (pyModbusTCP)
          After=network.target

          [Service]
          Type=simple
          User=vagrant
          ExecStart=/home/vagrant/modbus-venv/bin/python /home/vagrant/modbus_server.py
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable and start modbus-server
      systemd:
        name: modbus-server
        enabled: yes
        state: started