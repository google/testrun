<button
  mat-flat-button
  class="browse-files-button"
  aria-label="Browse Files to Add CA certificate. Upload a root or intermediate certificate"
  matTooltip="Upload a root certificate or an intermediate certificate"
  (click)="file_input.click()">
  Browse Files to Add CA certificate
</button>

<input
  #file_input
  id="default-file-input"
  type="file"
  accept=".cert,.crt,.pem,.cer"
  (change)="fileChange($event)" />
